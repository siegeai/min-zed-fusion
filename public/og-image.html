<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>min. OG Image Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .og-container {
            width: 1200px;
            height: 630px;
            position: relative;
            background: #FAFAF9;
            overflow: hidden;
        }
        .glow-1 {
            position: absolute;
            top: -220px;
            left: 50%;
            transform: translateX(-50%);
            width: 900px;
            height: 520px;
            background: radial-gradient(ellipse at center, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
        }
        .content {
            position: relative;
            z-index: 10;
            padding: 72px 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 40px;
            font-weight: 600;
            color: #0A0A0A;
            letter-spacing: -0.02em;
            margin-bottom: 38px;
        }
        .logo-mark {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: #0A0A0A;
        }
        .headline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 74px;
            font-weight: 600;
            color: #0A0A0A;
            line-height: 1.05;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
        }
        .subheadline {
            font-size: 30px;
            font-weight: 400;
            color: #6B7280;
            line-height: 1.4;
            max-width: 760px;
        }
        .prompt-bar {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            padding: 16px 22px;
            max-width: 680px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }
        .prompt-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #0A0A0A;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .prompt-text {
            font-size: 20px;
            color: #374151;
            font-weight: 400;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 26px;
            border-top: 1px solid rgba(0, 0, 0, 0.07);
        }
        .domain {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            color: #0A0A0A;
            font-weight: 600;
        }
        .features {
            display: flex;
            gap: 14px;
        }
        .feature-pill {
            font-size: 16px;
            color: #4B5563;
            background: #FFFFFF;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 99px;
            padding: 7px 16px;
        }
    </style>
</head>
<body>
    <div class="og-container">
        <div class="glow-1"></div>

        <div class="content">
            <div>
                <div class="logo">min.</div>
                <div class="headline">
                    Talk to your tools and<br>
                    data, all in one place.
                </div>
                <div class="subheadline">
                    min organizes your emails, docs, CRM, and ERP into a memory for every team and project.
                </div>
            </div>

            <div>
                <div class="prompt-bar">
                    <div class="prompt-avatar">✨</div>
                    <div class="prompt-text">
                        What are the next steps for the Acme account?
                    </div>
                </div>
            </div>

            <div class="footer">
                <div class="domain">getmin.ai</div>
                <div class="features">
                    <span class="feature-pill">Ask</span>
                    <span class="feature-pill">Chat</span>
                    <span class="feature-pill">Slack &amp; Teams</span>
                    <span class="feature-pill">Any LLM</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
